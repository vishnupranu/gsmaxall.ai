name: gsmaxall-full

# Full-stack local run: infra (Postgres + Qdrant + Redis) + all FastAPI services.
# The web app deploys to Vercel; run it locally with `pnpm --filter @gsmaxall/web dev`.
#
#   docker compose -f infrastructure/docker-compose.full.yml up --build
#
# Each service exposes /health on its port. Provider/DB credentials are optional —
# services run in demo/in-memory mode until the matching env vars are set.

x-service-env: &service-env
  DATABASE_URL: postgresql://gsmaxall:gsmaxall@postgres:5432/gsmaxall
  QDRANT_URL: http://qdrant:6333
  REDIS_URL: redis://redis:6379

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gsmaxall
      POSTGRES_PASSWORD: gsmaxall
      POSTGRES_DB: gsmaxall
    ports: ["5432:5432"]
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gsmaxall"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333", "6334:6334"]
    volumes:
      - ./data/qdrant:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes:
      - ./data/redis:/data

  orchestrator:
    build: ../services/orchestrator
    environment: *service-env
    ports: ["8080:8080"]
    depends_on: [postgres, qdrant, redis]

  agents:
    build: ../services/agents
    environment: *service-env
    ports: ["8081:8081"]
    depends_on: [postgres, redis]

  memory:
    build: ../services/memory
    environment: *service-env
    ports: ["8082:8082"]
    depends_on: [qdrant]

  rag:
    build: ../services/rag
    environment: *service-env
    ports: ["8083:8083"]
    depends_on: [qdrant]

  research:
    build: ../services/research
    environment: *service-env
    ports: ["8084:8084"]

  search:
    build: ../services/search
    environment: *service-env
    ports: ["8085:8085"]

  workflows:
    build: ../services/workflows
    environment: *service-env
    ports: ["8086:8086"]
    depends_on: [redis]

  media:
    build: ../services/media
    environment: *service-env
    ports: ["8087:8087"]

  admin:
    build: ../services/admin
    environment: *service-env
    ports: ["8088:8088"]
    depends_on: [postgres]

  analytics:
    build: ../services/analytics
    environment: *service-env
    ports: ["8089:8089"]
    depends_on: [postgres]
